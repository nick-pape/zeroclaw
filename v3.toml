[runtime_profiles.agent_complex_agent]
agentic = true
agentic_timeout_secs = 600
allowed_tools = [
    "shell",
    "memory",
]
timeout_secs = 180

[runtime_profiles.default]
compact_context = false
context_aware_tools = false
keep_tool_context_turns = 2
max_context_tokens = 32000
max_history_messages = 50
max_system_prompt_chars = 0
max_tool_iterations = 10
max_tool_result_chars = 50000
parallel_tools = true
tool_call_dedup_exempt = []
tool_dispatcher = "auto"

[scheduler]
catch_up_on_startup = true
enabled = true
max_concurrent = 4
max_run_history = 50
max_tasks = 64

[secrets]
encrypt = true

[security]

[security_ops]
auto_triage = false
enabled = false
max_auto_severity = "low"
playbooks_dir = "~/.zeroclaw/playbooks"
report_output_dir = "~/.zeroclaw/security-reports"
require_approval_for_actions = true

[shell_tool]
timeout_secs = 60

[skill_bundles.agent_complex_agent]
directory = "/opt/zeroclaw/skills"

[skills]
allow_scripts = false
open_skills_enabled = false
prompt_injection_mode = "full"

[skills.skill_creation]
enabled = false
max_skills = 500
similarity_threshold = 0.85

[skills.skill_improvement]
cooldown_secs = 3600
enabled = true

[sop]

[storage.qdrant.default]
collection = "zeroclaw_memories"
url = "http://127.0.0.1:6333"

[text_browser]
enabled = false
timeout_secs = 30

[transcription]

[trust]

[tts]

[tunnel]
tunnel_provider = "none"

[verifiable_intent]

[web_fetch]
allowed_domains = ["*"]
allowed_private_hosts = []
blocked_domains = []
enabled = true
max_response_size = 500000
timeout_secs = 30

[web_fetch.firecrawl]
api_key_env = "FIRECRAWL_API_KEY"
api_url = "https://api.firecrawl.dev/v1"
enabled = false
mode = "scrape"

[web_search]
enabled = true
max_results = 5
search_provider = "duckduckgo"
timeout_secs = 15

[workspace]
cross_workspace_search = false
enabled = false
isolate_audit = true
isolate_memory = true
isolate_secrets = true
workspaces_dir = "~/.zeroclaw/workspaces"
